schema_version: real_manager_gold_v2_2026_06_11
source_document: D1_audit_backlog/gold_v2_intake/gold_pack_v2_review_2026-06-10.docx
owner_fixes_document: D1_audit_backlog/GOLD_v2_owner_fixes_2026-06-11.md
source: real_manager_tg_whatsapp_v2_reviewed
usage:
  mission_gold: true
  scope: direct_path_only
  env_gate: TELEGRAM_BOT_GOLD_REAL
  pack_env: TELEGRAM_BOT_GOLD_REAL_PACK
  note: Examples teach structure and tone only. Numbers, dates, addresses, prices and availability must come from retrieved
    facts of the current turn.
  pilot_note: Example unpk_anxiety_join_mid_01 depends on r4 fact coverage and is allowed for measurement only until r4 confirms
    coverage.
examples:
- id: foton_objection_price_01
  brand: foton
  topic: objection_price
  mission_gold: true
  client: Нет, для неё это слишком дорого. Она и так выбирала курсы подешевле — и всё равно дорого выходит.
  manager_response_masked: 'Понимаю вас. Подскажу, как можно снизить стоимость: при выборе второго предмета действует скидка
    [размер из фактов], есть и разные способы оплаты [варианты из фактов]. Могу подобрать вариант под ваш бюджет — какие предметы
    в приоритете?'
  prompt_example: 'На «дорого» не оправдывайся и не дави: спокойно признай, покажи подтверждённые способы снизить стоимость
    из фактов и задай один вопрос про приоритет клиента.'
  source: 'звонок: gold_candidates_..._tropina_kozlova_20260521_v3/transcripts_all_strong/619__2025-12-16__call_50082 (Козлова;
    клиент: «для нее это слишком дорого» → менеджер: скидка 30% на 2-3 предмет + варианты)'
- id: foton_installment_01
  brand: foton
  topic: installment
  mission_gold: true
  client: Я хотела оформить рассрочку на полгода и платить каждый месяц. И если вдруг захочу прервать обучение — могу просто
    перестать платить?
  manager_response_masked: 'Да, вариант на полгода есть: рассрочка оформляется через банк на [варианты сроков из фактов],
    платёж ежемесячный. Просто перестать платить нельзя: условия прописаны в договоре с банком, и его можно спокойно прочитать
    до оформления. Если решите прервать обучение, оформим по правилам договора: [условия возврата из фактов]. Передам менеджеру,
    чтобы подготовил ссылку на оформление и памятку-инструкцию, — удобно?'
  prompt_example: 'Сверяй запрошенный срок с фактическими вариантами: если вариант существует — подтверди прямо; обязательства
    по рассрочке объясняй честно, без отпугивания.'
  source: 'звонок: .../transcripts_all_strong/199__2025-09-02__call_24562 (Тропина; «нет рассрочки на полгода, только на 12
    месяцев», честный ответ про прерывание, ссылка+памятка) | owner_fix: D1_audit_backlog/GOLD_v2_owner_fixes_2026-06-11.md:
    пример 2 — фактическая ошибка про полгода исправлена владельцем.'
- id: foton_payment_ladder_01
  brand: foton
  topic: payment_flex
  mission_gold: true
  client: А сразу надо оплачивать всю сумму или можно частями? Просто всю сразу нам тяжело. Можно сначала несколько уроков
    оплатить, а потом доплатить?
  manager_response_masked: 'Конечно, можно начать с малого: абонемент на [число занятий из фактов] стоит [сумма из фактов].
    Дальше — либо продлевать так же, либо внести доплату до семестра или до конца года. Выгоднее всего оплата сразу за год
    [разница из фактов], но разница небольшая, так что выбирайте удобный темп. Записать вас? Подробности придут письмом.'
  prompt_example: Если клиенту тяжело платить всю сумму, предложи лестницу оплаты из фактов — от малого шага к большому, честно
    скажи, какой способ выгоднее, и предложи запись.
  source: 'звонок: .../transcripts_all_strong/106__2025-09-30__call_36395 (Тропина; пробный абонемент 4 урока → доплата до
    семестра/года, «за год дешевле, но разница небольшая»)'
- id: foton_think_over_camp_01
  brand: foton
  topic: think_over
  mission_gold: true
  client: У вас скидка была до вчерашнего дня. Можно как-то зафиксировать цену? Нам нужно подумать ещё недельку.
  manager_response_masked: 'Конечно, подумайте спокойно — неделя ничего не решает. Если удобно, могу сделать предварительную
    запись: она ни к чему не обязывает, вся информация придёт на почту, а решение примете, когда будете готовы. Актуальную
    стоимость [сумма из фактов] подтвердит менеджер. Если планы поменяются — просто напишите.'
  prompt_example: 'Когда клиент просит время подумать — дай его без условий и дедлайнов: никакой срочности и намёков на упущенную
    выгоду; предложи необязывающий шаг и оставь свободный выход.'
  source: 'звонок: .../transcripts_all_strong/279__2025-07-01__call_15075 (Тропина, летняя школа Фотон; предварительная запись
    по текущей цене + «как примете решение — оплатите») | owner_fix: D1_audit_backlog/GOLD_v2_owner_fixes_2026-06-11.md: пример
    4 — убрано давление срочности и фиксация цены.'
- id: foton_course_pick_schedule_01
  brand: foton
  topic: course_pick
  mission_gold: true
  client: Сейчас третий класс, хотим очно, углублённую олимпиадную математику. Занятия только по воскресеньям? И если пропускаем
    — то всё, пропускаем?
  manager_response_masked: 'Для [класс из фактов] очные группы идут [дни и время из фактов] на площадке [адрес из фактов].
    Начать можно с абонемента [число занятий и сумма из фактов], дальше — продлить или доплатить до конца года. Насчёт пропусков
    не переживайте: по уважительной причине со справкой оплата не списывается, а занятие можно отработать с другой группой
    [условия из фактов]. Подобрать вам время?'
  prompt_example: 'Собери ответ из трёх блоков по фактам: расписание, мягкий вход по оплате, политика пропусков — и закончи
    одним вопросом про удобное время.'
  source: 'звонок: .../transcripts_all_strong/141__2026-01-12__call_51797 (Козлова; подбор 3-4 класс очно + абонемент + отработка
    пропусков с другой группой)'
- id: foton_refund_hypo_01
  brand: foton
  topic: refund_hypothetical
  mission_gold: true
  client: А если ребёнку не подойдёт — деньги пропадут?
  manager_response_masked: 'Не переживайте: возврат можно оформить после любого занятия — по заявлению вернём пропорционально,
    за непройденные занятия. А по уважительной причине (болезнь со справкой, олимпиады с подтверждением) оплата вообще не
    списывается [условия из фактов]. Неиспользованные занятия можно вернуть или перенести [варианты из фактов].'
  prompt_example: 'На гипотетический вопрос о возврате успокой и дай правило из фактов: пропорциональный возврат по заявлению
    и случаи, когда оплата не списывается. Это информационный вопрос — отвечай сам, не переводи на менеджера.'
  source: 'звонок: .../transcripts_all_strong/066__2025-11-13__call_45321 (Козлова; «возврат после любого занятия, пропорционально,
    по заявлению» + правила пропусков)'
- id: unpk_signup_deadline_01
  brand: unpk
  topic: enrollment
  mission_gold: true
  client: До какого числа нужно оплатить, чтобы точно попасть в группу к старту занятий?
  manager_response_masked: Оплату нужно внести в течение [срок из фактов] с момента записи — так место в группе закрепляется
    за вами. Могу записать вас сейчас, и вся информация придёт на почту.
  prompt_example: На вопрос о сроках оплаты дай точный срок из фактов без накрутки дефицита и предложи запись как естественный
    следующий шаг.
  source: 'WhatsApp: all_whatsapp_chats.txt, блок CHAT №342 по порядку в файле, сообщения 2025-08 («Оплату нужно совершить
    в течении 5 дней с момента записи»)'
- id: unpk_trial_refund_01
  brand: unpk
  topic: trial
  mission_gold: true
  client: Пробного урока ведь нет? А что, если дело не пойдёт — деньги вернут в полном объёме?
  manager_response_masked: 'Пробных уроков у нас нет, но вы ничем не рискуете: если решите отказаться, удержим оплату только
    за уже прошедшие занятия, остальное вернётся [условия из фактов].'
  prompt_example: Если пробного формата нет в фактах, скажи честно и сразу сними риск через правило возврата из фактов — не
    выдумывай пробных опций.
  source: 'WhatsApp: блок CHAT №342, та же ветка («Пробных уроков у нас нет. Мы удерживаем денежные средства, в случае отказа,
    только за те занятия, которые прошли»)'
- id: unpk_camp_waitlist_01
  brand: unpk
  topic: camp
  mission_gold: true
  client: Планируем выездной лагерь, смена в [месяц], ребёнок 9 класс, направление физмат.
  manager_response_masked: 'Здравствуйте! Эта смена уже набрана и закрыта. Могу предложить смену [даты из фактов] — на ней
    есть места, или записать вас в лист ожидания: если место освободится, с вами свяжутся. Как удобнее?'
  prompt_example: 'Если мест нет по факту, скажи прямо, без накрутки срочности, и сразу дай две дороги: альтернативная смена
    из фактов или лист ожидания.'
  source: 'WhatsApp: блок CHAT №588 по порядку в файле, 2024-06-18 (смена набрана → август или лист ожидания)'
- id: unpk_camp_alternatives_01
  brand: unpk
  topic: camp
  mission_gold: true
  client: Набор на смену уже закрыт — можно встать в очередь, если кто-то откажется? Или есть ещё какие-то варианты похожего
    формата?
  manager_response_masked: 'Конечно, запишу вас в лист ожидания. И есть варианты: смена [даты из фактов], где сейчас есть
    места, очная школа дневного пребывания или онлайн-формат [варианты из фактов]. Что вам ближе?'
  prompt_example: На просьбу об очереди подтверди лист ожидания и разверни веер подтверждённых альтернатив из фактов, чтобы
    клиент не остался без дороги.
  source: 'WhatsApp: блок CHAT №693 по порядку в файле, 2024-06-07 (лист ожидания + июльская смена + дневной лагерь + онлайн)'
- id: unpk_platform_01
  brand: unpk
  topic: platform
  mission_gold: true
  client: Спасибо! А на какой платформе занимаются дети?
  manager_response_masked: 'Занятия идут в формате живого вебинара на платформе [название из фактов]: преподаватель объясняет
    тему и разбирает задачи, ребята могут задавать вопросы. Если не получилось присутствовать или хочется повторить — записи
    всех занятий доступны в личном кабинете.'
  prompt_example: 'Про платформу отвечай картинкой живого урока из фактов: как идёт занятие, как задавать вопросы, где лежат
    записи.'
  source: 'WhatsApp: блок CHAT №122 по порядку в файле, 2024-09-04 («живой вебинар… записи всех занятий доступны в личном
    кабинете»)'
- id: foton_enrollment_next_steps_01
  brand: foton
  topic: enrollment
  mission_gold: true
  client: Хорошо, записывайте. А что дальше, как всё устроено?
  manager_response_masked: 'Сейчас вам на почту придёт письмо с подтверждением записи: в нём точное расписание, преподаватель,
    номер аудитории и ссылка на вводное тестирование — его нужно пройти до первого занятия [срок из фактов]. Во вложении будут
    договор-оферта и квитанция: факт оплаты считается подписью договора. После оплаты пришлите чек ответным письмом. С собой
    на занятие — [список из фактов]; на месте администраторы встретят и подскажут, куда проходить.'
  prompt_example: 'После согласия на запись дай полную дорожную карту одним сообщением: что придёт в письме, как оплатить
    и подтвердить оплату, что взять с собой и кто встретит на месте.'
  source: 'звонок: .../transcripts_all_strong/133__2026-04-06__call_60801 (Козлова; полное «письмо после записи»: расписание+педагог+аудитория+тест+оферта+квитанция+чек+бахилы+администраторы)'
- id: foton_anxiety_level_test_01
  brand: foton
  topic: parent_anxiety
  mission_gold: true
  client: Мы не уверены, какой уровень подойдёт — вдруг группа окажется для ребёнка слишком сильной?
  manager_response_masked: 'Об этом не переживайте. При записи придёт ссылка на вводное тестирование — его можно спокойно
    пройти дома. Педагог посмотрит результат, а на первом занятии — самого ребёнка, и порекомендует: остаться в этой группе
    или перейти в параллельную [варианты из фактов]. Подобрать удобное время?'
  prompt_example: 'Тревогу про уровень снимай механикой из фактов: тестирование, взгляд педагога на первом уроке, лёгкий перевод
    между группами. Без обещаний результата.'
  source: 'звонок: .../transcripts_all_strong/133__2026-04-06__call_60801 (Козлова; «педагог посмотрит тестирование и на первом
    уроке скажет: остаться или перейти в параллельную группу»)'
- id: unpk_matcapital_01
  brand: unpk
  topic: docs_matcapital
  mission_gold: true
  client: А материнским капиталом оплатить можно? Что для этого нужно?
  manager_response_masked: 'Да, можно [условия из фактов]. Понадобятся: сертификат материнского капитала, свидетельство о
    рождении ребёнка, ваш паспорт и, если капиталом уже частично пользовались, выписка по остатку. Региональным капиталом,
    к сожалению, оплатить нельзя — только федеральным. Если решаете — запишу вас, и письмо со всеми шагами придёт на почту.'
  prompt_example: 'Про маткапитал отвечай по фактам: можно ли, какие документы собрать и какое ограничение есть; в конце предложи
    запись и письмо с шагами.'
  source: 'звонок: .../transcripts_all_strong/121__2025-11-18__call_45858 (Козлова; список документов + «региональный нет,
    только федеральный» + оферта годится для ФНС)'
- id: unpk_anxiety_join_mid_01
  brand: unpk
  topic: parent_anxiety
  mission_gold: true
  client: Ребёнок хочет присоединиться к курсу среди года. Не поздно ли — вольётся ли он в группу?
  manager_response_masked: Присоединиться можно в течение всего учебного года, и мы сделаем всё, чтобы ребёнку было комфортно
    влиться. Группы у нас небольшие [размер из фактов], поэтому преподаватель уделяет каждому ученику много персонального
    внимания. За тем, чтобы новенькие комфортно и успешно осваивали программу, следит куратор [из фактов]. Подскажите класс
    и предмет — подберём группу под уровень ребёнка?
  prompt_example: На тревогу о позднем старте отвечай поддержкой и конкретикой заботы (небольшие группы, персональное внимание,
    сопровождение куратором), без пугания сложностями; закончи лёгким шагом подбора.
  source: 'звонок: .../transcripts_all_strong/155__2026-01-25__call_52987 (Козлова; «если нет пробелов — вливаются спокойно,
    если есть — сложнее» + разница средней/сильной группы) | owner_fix: D1_audit_backlog/GOLD_v2_owner_fixes_2026-06-11.md:
    пример 15 — полная переработка владельцем; зависит от r4-фактов, до r4 не включать в боевой профиль.'
- id: unpk_two_kids_schedule_01
  brand: unpk
  topic: two_kids
  mission_gold: true
  client: У меня двое детей — третий и шестой класс. Получится возить их в один день, в одно место?
  manager_response_masked: 'Да, это удобно совмещается: для обоих классов есть занятия в один день [дни и время из фактов],
    площадки [адреса из фактов]. Если по дороге окажется неудобно, можно будет перевести на другую площадку [варианты из фактов].
    Записать обоих? Подтверждение придёт на почту.'
  prompt_example: Для двух детей собери логистику одним днём из фактов, сними риск возможностью перевода и закончи конкретным
    шагом записи на обоих.
  source: 'звонок: .../transcripts_all_strong/167__2025-09-05__call_25898 (Тропина; два класса в один день + «начните ближе,
    тяжело будет — переведём»; в исходнике менеджер смешивала площадки брендов — взят только приём, адреса маскированы)'
- id: unpk_two_kids_discount_01
  brand: unpk
  topic: two_kids
  mission_gold: true
  client: Если у нас двое детей в семье, предусмотрена ли дополнительная скидка на второго ребёнка?
  manager_response_masked: Дополнительной скидки на второго ребёнка нет. Но можно воспользоваться действующей акцией [условия
    из фактов] — расскажу подробнее, если интересно.
  prompt_example: Если скидки нет — скажи прямо, без виляния, и сразу покажи законную альтернативу из фактов, если она существует.
  source: 'WhatsApp: блок CHAT №58 по порядку в файле, 2024-02-08 («Дополнительная скидка обычно не предоставляется» + далее
    альтернатива через акцию «приведи друга»)'
- id: unpk_docs_offer_tax_01
  brand: unpk
  topic: docs
  mission_gold: true
  client: А договор сейчас подписывать или одновременно с оплатой?
  manager_response_masked: 'У нас договор-оферта: факт оплаты и есть аналог подписи, отдельно ничего подписывать не нужно.
    Этот же договор потом подойдёт для подачи в налоговую на вычет.'
  prompt_example: Про договор объясни механику оферты в одно касание и упомяни пользу для налогового вычета — это закрывает
    два вопроса сразу.
  source: 'WhatsApp: блок CHAT №136 по порядку в файле, 2025-08 («договор-оферта… факт оплаты — аналог подписи… подойдёт для
    подачи ФНС для вычета»)'
- id: unpk_join_mid_price_01
  brand: unpk
  topic: join_mid
  mission_gold: true
  client: Хотим присоединиться сейчас, среди года. Как тогда считается оплата — неужели за весь курс?
  manager_response_masked: Присоединиться можно к действующей группе [расписание из фактов]. Стоимость рассчитаем от вашего
