schema_version: bot_policy_v6_1_2026_05_20_team_answers
generated_at: '2026-05-20'
risk_levels:
  low:
    routes:
    - bot_answer_self
    - bot_answer_self_for_pilot
    - draft_for_manager
    description: Бот может дать содержательный черновик. Менеджер проверяет перед
      отправкой.
  medium:
    routes:
    - draft_for_manager
    - bot_answer_self_for_pilot
    description: Бот всегда готовит черновик. bot_answer_self_for_pilot допустим —
      пилот идёт сначала на сотрудниках, потом на лояльной группе.
  high:
    routes:
    - manager_only
    description: ZERO collect. Бот не уточняет, не комментирует, передаёт менеджеру
      с приоритетом.
pilot_mode:
  enabled: true
  rationale: 'Решение Дмитрия от 2026-05-17. Пилот сначала на сотрудниках, потом на
    лояльной подготовленной группе клиентов. bot_answer_self_for_pilot разрешён в
    темах: brand_relationship (по строгому шаблону), matkap (info-ответ), tax_deduction
    (info-ответ), positive_feedback, is_it_bot, schedule (общая информация), program.'
  rollback_trigger: Если в пилоте бот ошибся хотя бы раз — переход в режим draft_for_manager
    до правок.
discounts_policy:
  rule: Бот НИКОГДА не называет процент скидки без условия применения в том же предложении.
  reason: Без условия клиент может неправильно понять, на что именно скидка распространяется.
  examples:
    bad: У вас скидка 20% на 2-й предмет.
    good: Скидка 20% на второй и последующий предмет одного и того же ребёнка при
      оплате очного формата.
  implementation:
    rule_for_codex: При развёртке фактов скидок из YAML поле `condition_client_text`
      ОБЯЗАТЕЛЬНО входит в client_safe_text. Без condition факт не может иметь allowed_for_client_answer=true.
    semantic_test: test_v3_discount_facts_have_condition_in_client_safe_text
promo_codes_policy:
  bot_handles_promo: false
  reason: 22 промокода без даты окончания акции. Риск предложить истёкший.
  route: draft_for_manager
  bot_phrase: Спасибо, передам менеджеру — он подскажет актуальные акции и промокоды.
  applies_to_brands:
  - foton
  - unpk
  scope: Все промокоды без исключения. Включая LVSH-VEB20, LVSH-KF-10, преподавательские,
    Флоктори, MFTI-students.
approved_phrases_themes_11_12_17:
  theme_11_contract:
    foton_bot: Договор пришлёт менеджер в ближайшие дни на email. Подскажите email.
    unpk_bot: Договор пришлёт менеджер в ближайшие дни на email. Подскажите email.
    note: РОП заменил «в течение рабочего дня» на «в ближайшие дни» (мягче, нет жёсткого
      обещания)
    bot_route: bot_answer_self_for_pilot
  theme_12_certificate:
    foton_bot: Менеджер подготовит справку и пришлёт в течение 10 рабочих дней (постараемся
      быстрее). Подскажите, какая справка нужна — по требованию (для работы / иное)
      или для налогового вычета? И ФИО плательщика, ФИО ребёнка, за какой период.
    unpk_bot: Менеджер подготовит справку и пришлёт в течение 10 рабочих дней (постараемся
      быстрее). Подскажите, какая справка нужна — по требованию (для работы / иное)
      или для налогового вычета? И ФИО плательщика, ФИО ребёнка, за какой период.
    note: 'РОП 2026-05-19: бот уточняет тип справки только из двух вариантов — «по
      требованию» или «для налогового вычета». Срок: 10 рабочих дней (РОП 2026-05-17
      — это финальный срок, версия про 3 дня устарела).'
    bot_route: bot_answer_self_for_pilot
    forbidden_to_ask:
    - КНД 1151158
  theme_17_teachers:
    rule: Бот не называет имён преподавателей в общих вопросах. Имя сообщается ТОЛЬКО
      когда клиент уже учится в конкретной группе.
    foton_bot: Преподаватели — из МФТИ, МГУ, ВШЭ, МГТУ им. Баумана, МИФИ. Эксперты
      ЕГЭ, члены жюри олимпиад. Если ребёнку не подойдёт педагог — переведём в другую
      группу.
    unpk_bot: Преподаватели — из МФТИ, МГУ, ВШЭ, МГТУ им. Баумана, МИФИ. Эксперты
      ЕГЭ, члены жюри олимпиад. Если ребёнку не подойдёт педагог — переведём в другую
      группу.
    when_already_studying: Только тогда бот может назвать имя преподавателя группы
      по запросу.
    note: 'РОП решение 2026-05-17: убрать все имена из общих ответов. Регалии оставить.'
    bot_route: bot_answer_self_for_pilot
theme_routes:
  pricing:
    risk: low
    requires_brand_filter: true
    requires_fact_freshness:
    - fresh_verified
    - document_verified
    - dynamic_needs_check
    when_dynamic_needs_check: manager_check_text + draft без точной цифры
  discounts:
    risk: low
    requires_brand_filter: true
  installment:
    risk: low
    requires_brand_filter: true
    foton_specific:
      allowed_facts:
      - installment.tbank
      - installment.dolyami
      forbidden_in_client:
      - упоминание УНПК
      - сравнение с УНПК
    unpk_specific:
      allowed_facts:
      - alternative_payment_schedules
      forbidden_in_client:
      - Фотон
      - Т-Банк
      - Долями
      - у Фотона есть
      fallback_phrase: В УНПК можно платить помесячно, за семестр или за год. При
        оплате за семестр действует скидка 10%, за год - 14%. Если нужно растянуть
        оплату, менеджер подскажет варианты под вашу ситуацию.
  matkap:
    risk: low_when_informational
    high_when:
    - клиент требует гарантии одобрения СФР
    - клиент в конфликтной формулировке
    routing:
      Можно оплатить маткапиталом?: bot_answer_self_for_pilot
      Какие документы нужны?: draft_for_manager
      Гарантируете одобрение СФР?: manager_only
      Региональный маткапитал?: bot_answer_self
    brand_isolation:
      unpk_bot:
        approved_phrase: Да, оплата материнским капиталом возможна. Работаем с федеральным
          маткапиталом. Менеджер пришлёт перечень документов и поможет с оформлением
          через СФР. Подскажите ФИО ребёнка и какой курс рассматриваете.
        notes: Бренд и юр.лицо клиенту не раскрываются. Внутренне — АНО ДПО УНПК МФТИ.
      foton_bot:
        approved_phrase: Да, оплата материнским капиталом возможна. Работаем с федеральным
          маткапиталом. Менеджер пришлёт перечень документов и поможет с оформлением
          через СФР. Подскажите ФИО ребёнка и какой курс рассматриваете.
        notes: Бренд и юр.лицо клиенту не раскрываются. Внутренне — оформление через
          юр.лицо Фотона.
  tax_deduction:
    risk: low_when_informational
    high_when:
    - клиент требует гарантии возврата от ФНС
    routing:
      Можно получить налоговый вычет?: bot_answer_self_for_pilot
      Какие документы нужны?: draft_for_manager
      За несколько лет можно?: bot_answer_self
      Сколько вернут на двоих детей?: bot_answer_self_for_pilot
      Гарантируете возврат: manager_only
    brand_isolation:
      unpk_bot:
        approved_phrase: Налоговый вычет за обучение возможен — у нас есть лицензия.
          За обучение ребёнка можно вернуть до 14 300 ₽ в год. Типовая справка готовится
          в течение 10 рабочих дней, постараемся быстрее. Менеджер пришлёт инструкцию
          и поможет с заявлением.
        notes: Не называть номер лицензии и юр.лицо. Клиент видит просто «у нас есть
          лицензия».
      foton_bot:
        approved_phrase: Налоговый вычет за обучение возможен — у нас есть лицензия.
          За обучение ребёнка можно вернуть до 14 300 ₽ в год. Типовая справка готовится
          в течение 10 рабочих дней, постараемся быстрее. Менеджер пришлёт инструкцию
          и поможет с заявлением.
        notes: Не называть номер лицензии и юр.лицо.
  payment_status:
    risk: medium
    requires_amo_check: true
    requires_tallanto_check: true
    decision_matrix:
      amo_match_AND_tallanto_match:
        action: bot_answer_self
        phrase: Вижу, что оплата отмечена. Спасибо!
      amo_match_OR_tallanto_match_only:
        action: draft_for_manager
        phrase: Проверю у менеджера — он сверит детали и подтвердит в течение рабочего
          дня.
      conflict:
        action: manager_only
        internal_flag: payment_source_conflict
        manager_checklist:
        - Сверить AMO
        - Сверить Tallanto
        - Найти расхождение
      no_data:
        action: draft_for_manager
        phrase: Передам менеджеру на сверку — он подтвердит в течение рабочего дня.
  refund:
    risk: high
    route: manager_only
    bot_phrase: Спасибо, что обратились. Менеджер свяжется с вами по телефону в ближайшее
      время.
    bot_phrase_when_phone_missing: Спасибо, что обратились. Чтобы менеджер связался
      с вами по возврату — пришлите, пожалуйста, удобный номер телефона. Менеджер
      позвонит в ближайшее время.
    collect: false
    notes: ZERO collect. Бот ничего не уточняет про возврат (причины, суммы, ФИО).
      Шаблон возврата клиенту не показывается. Менеджер сам выбирает шаблон по юр.лицу
      клиента. Если в карточке клиента нет телефона — бот один раз просит телефон
      (только это поле) и больше ничего не уточняет.
  complaint:
    risk: high
    route: manager_only
    bot_phrase: Спасибо, что обратились. Передаю менеджеру — он свяжется с вами в
      ближайшее время.
    bot_phrase_p0: Ваше обращение принято. Передам его ответственному сотруднику,
      он свяжется с вами.
    p0_response_rule: При срабатывании любого p0_trigger бот отвечает строго bot_phrase_p0.
      Без слов «автоматический ответ», «бот» или «ИИ». Тема дальше — только менеджер.
    collect: false
    p0_triggers:
    - суд
    - иск
    - прокуратура
    - роспотребнадзор
    - отзыв в интернете
    - СМИ
  legal_threat:
    risk: high
    route: manager_only
    bot_phrase: Спасибо, что обратились. По этому вопросу свяжется ответственный сотрудник
      в ближайшее время.
    collect: false
  legal_reference:
    risk: low
    route: draft_for_manager
    notes: Не блокировать автоматически. Передать менеджеру с черновиком.
  schedule:
    risk: low
    requires_brand_filter: true
    requires_fact_freshness:
    - fresh_verified
    - dynamic_needs_check
  camp_lvsh:
    risk: low
    requires_brand_filter: true
    requires_fact_freshness:
    - fresh_verified
    - dynamic_needs_check
    dynamic_facts:
    - mesta_v_smene
    - status_smeny
  intensive:
    risk: low
    requires_brand_filter: true
    brand_isolation:
      foton_bot:
        allowed_intensives:
        - oge_8_9
        when_asked_about_ege: По интенсиву на ЕГЭ менеджер подскажет варианты — свяжется
          в течение рабочего дня.
        notes: 'q6 открыт: есть ли у Фотона ЕГЭ-программы помимо интенсивов? До ответа
          РОПа — handoff менеджеру без упоминания УНПК.'
      unpk_bot:
        allowed_intensives:
        - ege_10_11
        when_asked_about_oge: По интенсиву на ОГЭ менеджер подскажет варианты — свяжется
          в течение рабочего дня.
        notes: 'q6 открыт: есть ли у УНПК ОГЭ-программы помимо интенсивов? До ответа
          РОПа — handoff без упоминания Фотона.'
  brand_relationship:
    risk: medium
    route: bot_answer_self_for_pilot
    approved_response: Это отдельные организации, по вашему вопросу сориентирую в
      рамках текущего учебного центра.
    followup: Не добавлять подробностей про связь брендов и условия другого. Если
      вопрос чувствительный — handoff менеджеру.
    forbidden_phrasings:
    - раньше сотрудничали
    - были одно
    - наш партнёр
    open_question_for_rop_q3: Согласовать финальную формулу с юристом.
  enrollment:
    risk: low
    requires_brand_filter: true
    route: draft_for_manager
    collect_required_fields:
    - класс ребёнка
    - предмет
    - формат (онлайн или очно)
    - email родителя
    - ФИО ребёнка
    - телефон родителя
    collection_rule: Перед запросом каждого поля бот проверяет, есть ли оно уже в
      контексте. Просим только недостающие данные.
    bot_response_deadline: в ближайшее время
  theme_routes_part2:
    materials_homework:
      route: draft_for_manager
    results_social_proof:
      route: draft_for_manager
      notes: 'Использовать только подтверждённые соцдоказательства: УНПК — 100 000
        учеников; Фотон — Лидер отрасли 2025.'
    forgot_password:
      route: draft_for_manager
      collect:
      - email
      - ФИО ребёнка
    missing_link:
      route: draft_for_manager
    adult_18_plus:
      route: bot_answer_self_for_pilot
      notes: Курсов 18+ нет у обоих брендов; если вопрос про маткапитал 19+, приоритет
        у matkap.when_age_over_18.
    preschool:
      route: bot_answer_self_for_pilot
      notes: Дошкольные программы закрываются у обоих брендов.
    reschedule_lesson:
      route: draft_for_manager
      collect:
      - ФИО ребёнка
    change_group:
      route: draft_for_manager
      manager_must_check:
      - наличие мест в целевой группе
    illness:
      route: draft_for_manager
      rules:
        online: Бот может сказать, что запись урока сохранится.
        offline: Перенос или компенсация — всегда менеджер.
        certificate: Справка от ребёнка не нужна; 079у только для лагеря.
    b2b:
      route: manager_only
      collect:
      - название школы/организации
      - контактное лицо
      deadline: в течение рабочего дня
    group_discount:
      route: draft_for_manager
      notes: Для школ/классов — handoff, бот процент не называет.
    free_trial_online:
      route: bot_answer_self
      applies_to_brands:
      - foton
      - unpk
    free_trial_offline_foton:
      route: draft_for_manager
      applies_to_brands:
      - foton
    free_trial_offline_unpk:
      route: draft_for_manager
      applies_to_brands:
      - unpk
    diagnostic_test:
      route: draft_for_manager
      notes: Диагностика после оплаты, не предлагать до оплаты.
    combined_question:
      route: bot_answer_self_for_pilot
      rules:
        forbid_future_prices: true
        combined_with_high_risk:
          trigger_topics:
          - refund
          - complaint
          - legal_threat
          override_route: manager_only
          client_send: false
          manager_draft_allowed: true
post_filter_draft_text:
  forbidden_in_any_brand:
  - source_id
  - freshness
  - fact_id
  - JSON
  - AMO
  - Tallanto
  - CRM
  - Mango
  - я бот
  - я ИИ
  - я нейросеть
  - GPT
  - Claude
  - Codex
  - ChatGPT
  - Это автоматический ответ
  - автоматический ответ
  forbidden_when_active_brand_foton:
    inherited_from: brand_rules.yaml::forbidden_client_mentions.when_active_brand_is_foton
  forbidden_when_active_brand_unpk:
    inherited_from: brand_rules.yaml::forbidden_client_mentions.when_active_brand_is_unpk
  violation_action: Black draft, route to manager with flag brand_separation_violation
  no_future_prices:
    rule: Бот называет только актуальные цены. После периодов повышения цены — handoff
      менеджеру за актуальной цифрой.
    forbid_phrases:
    - будущая цена
    - после повышения
    - цена вырастет до
    notes: Если клиент спрашивает будущую цену, не угадываем и не называем число.
unsupported_numeric_promise_detector:
  rule: Если в draft_text есть число (₽, %, дней, баллов), оно должно быть привязано
    к fact_id с allowed_for_client_answer=true. Иначе — оставить только описание без
    числа.
  examples_blocked:
  - Стоимость 89 900 ₽ (без fact)
  - Скидка 30% (без fact)
  - До 14 300 ₽ возврата (без fact)
required_prompt_blocks:
- 'active_brand: foton|unpk'
- brand_rules.core_rule (1 строка)
- forbidden_client_mentions для текущего бренда
- approved_brand_relationship_answer (если в вопросе есть brand_relationship_trigger)
- 3-8 релевантных фактов из facts_for_bot_{BRAND}.yaml
- route по теме (что можно сказать, что должен проверить менеджер)
open_questions:
- id: q1
  question: Принимает ли Фотон маткапитал? Если нет — какой handoff делает бот Фотон?
  owner: Бухгалтерия (Клычева Дарья)
- id: q2
  question: Есть ли у ООО ЦДПО Фотон / ООО ЦРДО Фотон лицензия для налогового вычета?
  owner: Бухгалтерия
- id: q3
  question: Подтвердить нейтральную формулу на вопрос «вы и Фотон/УНПК — одно?». Текущий
    вариант «На данный момент никак, раньше сотрудничали» — приемлем или нужно ещё
    нейтральнее?
  owner: РОП + юрист
- id: q4
  question: Может ли бот Фотон вообще консультировать по продуктам, которые есть только
    у УНПК (ЕГЭ-интенсивы, индивидуальные занятия)? Или handoff без альтернатив?
  owner: РОП
- id: q5
  question: Список телефонов/мессенджеров — точно разные для двух брендов, не пересекаются?
  owner: ИТ + маркетинг
- id: q14
  question: УНПК очно 49 000/82 000 — это точно 5-11 класс или 1-4? В facts.csv привязка
    к 1-4 класс.
  owner: Бухгалтерия
- id: q15
  question: УНПК онлайн 41 800/69 900 — это обычный курс 9-11 класс или олимпиадная
    подготовка Физтех?
  owner: РОП
crm_tallanto_brand_detection_for_client_answer: false
telegram_active_brand_source: telegram_bot_or_channel
two_separate_telegram_bots: true
bot_answer_self_rollout:
  enabled_for_staff_tests: true
  enabled_for_loyal_prepared_clients: true
  enabled_for_public_traffic: false
