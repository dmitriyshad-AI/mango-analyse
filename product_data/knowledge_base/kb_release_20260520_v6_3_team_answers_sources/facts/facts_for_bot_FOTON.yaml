presentation_format_facts_2026_05_21:
  status: verified
  freshness_status: document_verified
  brand: foton
  source: Презентации ЦДПО «Фотон» по онлайн-подготовке, очной подготовке и лагерю;
    цены, даты и адреса из презентаций не переносились.
  client_facts:
    lesson_load_by_age:
      client_safe_text: 'В Фотоне нагрузка зависит от класса и формата: для 5-11 классов
        обычно 1 занятие в неделю по 3 академических часа (очное занятие длится около
        2 часов); для младших групп 1-4 очно и 3-4 онлайн — по 2 академических часа.'
    levels_explained:
      client_safe_text: 'В Фотоне есть три уровня подготовки: базовый — закрыть пробелы
        и уверенно идти по школьной программе; продвинутый — углублённая программа
        и темы за пределами школы с элементами олимпиад; олимпиадный — подготовка
        к перечневым олимпиадам и более сложным задачам. Уровень группы можно поменять,
        если ребёнку будет слишком легко или сложно.'
    subjects_by_class:
      client_safe_text: 'По предметам в Фотоне: онлайн есть математика для 3-11 классов,
        информатика для 5-11 классов, физика для 7-11 классов; очно есть математика
        для 3-11 классов, информатика для 5-11 классов, физика для 5-11 классов и
        русский язык для 9-11 классов.'
    student_account_access:
      client_safe_text: У ученика есть личный кабинет на учебной платформе. Если пароль
        забыт, его восстанавливают через кнопку «Забыли пароль»; центр не видит пароли
        учеников и не может назвать старый пароль.
    placement_and_first_feedback:
      client_safe_text: До старта ребёнок проходит вступительное тестирование и заполняет
        анкету — это помогает подобрать группу и адаптировать программу. Первые 3-4
        занятия преподаватель оценивает уровень и мотивацию, после чего можно дать
        первую обратную связь и при необходимости обсудить переход в другую группу.
    knowledge_control:
      client_safe_text: 'Контроль знаний строится не только на занятиях: есть вступительное
        и финальное тестирование, контрольные срезы примерно раз в 2-3 месяца, обратная
        связь от преподавателя в личном кабинете в течение 2 недель. Для 9-11 классов
        предусмотрены пробные экзамены 2 раза в год, для 3-8 классов — олимпиадные
        активности.'
    online_lesson_format:
      client_safe_text: 'Онлайн-занятия проходят в формате вебинаров на МТС Линк:
        ученики задают вопросы в чате, преподаватель может вызвать в голосовой или
        видео-чат, а записи уроков доступны для пересмотра.'
    offline_lesson_format:
      client_safe_text: 'Очные занятия проходят как семинары: теория и практика, разбор
        у доски, самостоятельная работа, конспекты. Домашнее задание задаётся не всегда,
        а когда оно действительно нужно для закрепления материала.'
    course_rules_safe:
      client_safe_text: На онлайн- и очных занятиях есть правила поведения и цифровой
        этикет. Это нужно, чтобы детям было комфортно учиться, задавать вопросы и
        не отвлекаться.
    offline_organization:
      client_safe_text: Перед очным стартом дату, время, адрес и кабинет присылают
        отдельным письмом. Основной канал информирования — email; Telegram-чаты с
        преподавателем и администратором обычно подключают на 2-м занятии. С собой
        нужны письменные принадлежности и тетрадь.
    attendance_tracking:
      client_safe_text: 'По очным занятиям следят за посещаемостью: если ребёнок пропускает
        2 занятия подряд без предупреждения, администратор связывается с родителями.'
    parent_access_offline:
      client_safe_text: Вход родителей в здание школы может быть ограничен правилами
        площадки, поэтому ожидание обычно организуют рядом с площадкой.
    online_technical_requirements:
      client_safe_text: Для онлайн-занятий нужен стабильный интернет от 2,5 Мбит/с.
        Можно подключаться с телефона или планшета через приложение МТС Линк, но полный
        функционал удобнее на компьютере в Chrome. Если есть техническая проблема,
        можно написать @support в чате занятия.
    age_goals:
      client_safe_text: 'Цели по возрастам разные: в 3-4 классах — интерес к предмету
        и логика; в 5-6 — математическая культура, сильные школы и элементы олимпиад;
        в 7-8 — глубокая проработка и поступление в сильные школы; в 9-11 — подготовка
        к ОГЭ/ЕГЭ; олимпиадные группы готовят к перечневым олимпиадам.'
