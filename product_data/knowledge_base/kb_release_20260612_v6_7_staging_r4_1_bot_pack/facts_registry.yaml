  title: kb v6 5 client safe facts 2026 06 03 / lesson format / client safe text
  fact_text: 'Занятия проходят в формате семинара: теория и практика вместе. Преподаватель
    в мини-группе разбирает задачи с учениками, есть интерактив с вопросами. Бывает
    этап индивидуальной работы: пока все решают свои задания, преподаватель подходит
    к каждому на несколько минут.'
