  - id: foton_price_trial_record
    brand: foton
    journey: "цена → пробное → запись"
    route: bot_answer_self
    required_fact_ids: ["foton.offline_5_11.semester=44600","foton.offline_5_11.year=74500","foton.trial.exists"]
    forbidden_if_fact_missing: ["называть цену","обещать пробное как бесплатное"]
    teaches: "no_reask_known + answer_then_one_step"
    turns:
      - {client: "ищу очные занятия по физике", bot: "Хороший выбор. Подскажите класс ребёнка — сразу сориентирую по программе и цене."}
