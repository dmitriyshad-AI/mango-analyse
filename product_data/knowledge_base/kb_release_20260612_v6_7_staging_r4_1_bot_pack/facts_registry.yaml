  title: r4 owner 2026 06 11 / unpk / matkap family age rule
  fact_text: Оплатить обучение материнским капиталом можно, когда ребёнку, с появлением
    которого возникло право на сертификат, исполнится 3 года. Направить средства можно
    на обучение любого из детей семьи — главное, чтобы к началу обучения ему было
    не больше 25 лет. Работаем с федеральным маткапиталом; менеджер пришлёт перечень
    документов и поможет с оформлением через СФР.
