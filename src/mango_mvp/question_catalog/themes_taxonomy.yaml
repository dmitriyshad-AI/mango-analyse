service_categories:
- service_id: service:S1_non_question
  service_name: Нет клиентского вопроса
  service_process: Повторная проверка распознавания или ручная проверка неясного фрагмента.
  short_description: Обрывок без вопроса, развернутый пересказ разговора или описание процедуры менеджером.
  routing_rule: Не классифицировать как тему; если источник звонок, отправить на повторную проверку распознавания или в unclear
    для человека.
  example_phrasings:
  - Обрывок без клиентского вопроса
  - Развернутый пересказ разговора
  - Описание процедуры менеджером
  default_bot_permission: draft_for_manager
  required_facts: []
  forbidden_promises:
  - Не превращать пересказ в тему для РОПа
  escalation_rule: Ручная проверка, если нельзя восстановить вопрос клиента.
  legacy_parent_mapping:
  - обрывок без клиентского вопроса
- service_id: service:S2_unclear
  service_name: Непонятный или неполный вопрос
  service_process: Уточняющий вопрос клиенту или передача менеджеру.
  short_description: Слишком короткий контекст, неполное сообщение или вопрос, который нельзя надежно отнести к теме.
  routing_rule: Бот задает мягкий уточняющий вопрос; если клиент не уточняет, передает менеджеру.
  example_phrasings:
  - Уточните, пожалуйста, вопрос про оплату?
  - Неполный контекст
  - Короткий обрывок внутри темы
  default_bot_permission: bot_self
  required_facts: []
  forbidden_promises:
  - Не угадывать тему при недостатке контекста
  escalation_rule: Менеджер, если после уточнения тема не стала понятной.
  legacy_parent_mapping:
  - неполный контекст / уточнение предыдущего сообщения
  - уточнение причины звонка
- service_id: service:S3_out_of_scope
  service_name: Неактуально или вне темы
  service_process: Корректное закрытие диалога без передачи менеджеру, если нет нового интереса.
  short_description: Клиент отказывается, пишет, что неактуально, ошибся номером, прислал спам или обращается к конкуренту.
  routing_rule: Бот корректно закрывает диалог и не передает менеджеру, если нет признаков нового интереса.
  example_phrasings:
  - Уже неактуально
  - Ошиблись номером
  - Нам это не нужно
  default_bot_permission: bot_self
  required_facts: []
  forbidden_promises:
  - Не продолжать продажу при явном отказе
  escalation_rule: Не передавать менеджеру, кроме случаев явного нового запроса.
  legacy_parent_mapping:
  - отказ / неактуально
- service_id: service:S4_status_request
  service_name: Статус запроса / ожидание ответа
  service_process: Передача менеджеру с пометкой, что клиент ожидает статус.
  short_description: Клиент спрашивает, когда ответят, есть ли результат, есть ли новости или какой следующий шаг.
  routing_rule: Бот не отвечает по сути, а передает менеджеру с пометкой статус ожидает.
  example_phrasings:
  - Когда ответят?
  - Есть новости?
  - Какой следующий шаг?
  default_bot_permission: draft_for_manager
  required_facts: []
  forbidden_promises:
  - Не обещать срок ответа без подтверждения менеджера
  escalation_rule: Менеджер с пометкой статус ожидает.
  legacy_parent_mapping:
  - статус запроса / ожидает ответа
  - следующий шаг / порядок действий
- service_id: service:S5_general_consultation
  service_name: Общая консультация
  service_process: Сбор базовых данных и передача менеджеру.
  short_description: Клиент просит общую консультацию или помощь без конкретной темы.
  routing_rule: Бот собирает, что интересует, для кого, какой класс и предмет, затем передает менеджеру.
  example_phrasings:
  - Нужна консультация
  - Подскажите, что выбрать
  - Хочу узнать про ваши курсы
  default_bot_permission: draft_for_manager
  required_facts: []
  forbidden_promises:
  - Не подменять консультацию менеджера произвольной рекомендацией
  escalation_rule: Менеджер после сбора базовых данных.
  legacy_parent_mapping:
  - общая консультация / нужна помощь
  - общий вопрос
  - сайт / источник информации
rop_policy_schema_version: question_catalog_rop_policy_v2_2026_05_15
allowed_rop_decisions:
- Бот отвечает сам
- Бот отвечает после проверки актуального факта
- Бот только собирает данные и передает менеджеру
- Только менеджер
- Тему нужно раздробить на более узкие случаи
