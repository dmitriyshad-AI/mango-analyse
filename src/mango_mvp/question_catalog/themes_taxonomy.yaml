  - Статус оплаты -> theme:003_payment_status
  example_phrasings:
  - Как успехи моего ребенка?
  - Сколько занятий пропустил?
  - Какие у него отметки?
  - Что нужно подтянуть?
  - Готов ли к экзамену?
