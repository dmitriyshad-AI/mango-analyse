- schema_version: kb_release_v2_fact_v1
  fact_id: fact:v2:internal:cross_brand_handoff_notes_installment_rule:05d6afada8
  fact_key: cross_brand_handoff_notes.installment.rule
  fact_type: installment
  fact_types:
  - installment
  title: cross_brand_handoff_notes / installment / rule
  fact_text: Рассрочка Т-Банк/Долями есть только в Фотоне. Если клиент бота УНПК спросил
    про рассрочку — бот не упоминает Фотон, а делает handoff менеджеру. Менеджер сам
    решает, отправлять ли клиента на отдельный диалог с Фотоном (если организационно
    возможно). Менеджер УНПК не консультирует клиента по условиям Фотона в текущем
    диалоге.
  short_fact: cross_brand_handoff_notes / installment / rule
