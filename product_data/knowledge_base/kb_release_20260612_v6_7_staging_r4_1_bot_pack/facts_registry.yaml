  fact_text: До старта ребёнок проходит вступительное тестирование и заполняет анкету
    — это помогает подобрать группу и адаптировать программу. Первые 3-4 занятия преподаватель
    оценивает уровень и мотивацию, после чего можно дать первую обратную связь и при
    необходимости обсудить переход в другую группу.
