  title: cross brand handoff notes / installment / rule
  fact_text: 'Внутренне: cross brand handoff notes / installment / rule — Рассрочка
    Т-Банк/Долями есть только в Фотоне. Если клиент бота УНПК спросил про рассрочку
    — бот не упоминает Фотон, а делает handoff менеджеру. Менеджер сам решает, отправлять
    ли клиента на отдельный диалог с Фотоном (если организационно возможно). Менеджер
    УНПК не консультирует клиента по условиям Фотона в текущем диалоге..'
