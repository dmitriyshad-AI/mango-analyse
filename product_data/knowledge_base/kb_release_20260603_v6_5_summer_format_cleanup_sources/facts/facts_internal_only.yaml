cross_brand_handoff_notes:
  installment:
    rule: Рассрочка Т-Банк/Долями есть только в Фотоне. Если клиент бота УНПК спросил
      про рассрочку — бот не упоминает Фотон, а делает handoff менеджеру. Менеджер
      сам решает, отправлять ли клиента на отдельный диалог с Фотоном (если организационно
      возможно). Менеджер УНПК не консультирует клиента по условиям Фотона в текущем
      диалоге.
  intensive:
    rule: ОГЭ-интенсив есть только в Фотоне (8-9 кл). ЕГЭ-интенсив есть только в УНПК
      (10-11 кл). Каждый бот говорит только про свой интенсив. На «нет такого продукта»
      — нейтральный handoff менеджеру без названия другого бренда.
  matkap:
    rule: Маткапитал принимает только УНПК (через АНО ДПО). Бот Фотон при вопросе
      про маткапитал делает handoff менеджеру, не консультируя по УНПК. Менеджер Фотона
      может организовать переход на отдельный диалог с УНПК, но это не задача бота.
  lvsh_mendeleevo:
    rule: Менделеево — общая физическая база. Свои лагеря там проводят и ЦДПО Фотон,
      и АНО ДПО УНПК МФТИ. Бот клиенту юр.лицо не раскрывает. Договор для клиента
      бота Фотон оформляется через ЦДПО Фотон; для клиента бота УНПК — через АНО ДПО
      УНПК МФТИ.
  shared_address_patsayeva:
    address: Долгопрудный, Проспект Пацаева, 7к1
    rule: Пацаева используется только УНПК МФТИ. У Фотона очных занятий на Пацаева
      НЕТ (Фотон в Долгопрудном работает в Школе дизайна — но бот про неё не упоминает).
      Если клиент бота Фотон спрашивает «можно очно в Долгопрудном?» — handoff менеджеру.
