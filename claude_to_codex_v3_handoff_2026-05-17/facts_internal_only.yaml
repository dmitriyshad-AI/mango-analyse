# ============================================================
# Cross-brand нюансы (для менеджеров — как обрабатывать handoff)
# ============================================================
cross_brand_handoff_notes:
  installment:
    rule: "Рассрочка Т-Банк/Долями есть только в Фотоне. Если клиент бота УНПК спросил про рассрочку — бот не упоминает Фотон, а делает handoff менеджеру. Менеджер сам решает, отправлять ли клиента на отдельный диалог с Фотоном (если организационно возможно). Менеджер УНПК не консультирует клиента по условиям Фотона в текущем диалоге."

  intensive:
    rule: "ОГЭ-интенсив есть только в Фотоне (8-9 кл). ЕГЭ-интенсив есть только в УНПК (10-11 кл). Каждый бот говорит только про свой интенсив. На «нет такого продукта» — нейтральный handoff менеджеру без названия другого бренда."

  matkap:
    rule: "Маткапитал принимает только УНПК (через АНО ДПО). Бот Фотон при вопросе про маткапитал делает handoff менеджеру, не консультируя по УНПК. Менеджер Фотона может организовать переход на отдельный диалог с УНПК, но это не задача бота."

  lvsh_mendeleevo:
    rule: "Юридически договор ЛВШ Менделеево заключается через АНО ДПО УНПК МФТИ. Но фактически ЛВШ как продукт может продаваться обоим брендам (открытый вопрос q1). До решения РОПа — клиенту бота Фотон ЛВШ предлагается как «наш летний продукт», юр.лицо не раскрывается."

  shared_address_patsayeva:
    address: "Долгопрудный, Проспект Пацаева, 7к1"
    rule: "Этот адрес используется и УНПК, и Фотон. Совпадение адреса не значит, что бренды одно и то же. В клиентском тексте бренд указывается тот, который в active_brand."

# ============================================================
# AMO и Tallanto — групповые правила
# ============================================================
crm_brand_groups:
  # АРХИТЕКТУРНОЕ РЕШЕНИЕ ИТ от 2026-05-17 ВЕЧЕР (ответ q5_it):
  # В AMO и Tallanto воронок с явным разделением по брендам НЕТ.
  # Определять бренд клиента по CRM-фильтру невозможно.
  amo:
    brand_split_in_funnels: false
    rule: "Воронок с брендом нет. Бот определяет бренд НЕ из AMO, а из самого Telegram-канала входа."
  tallanto:
    brand_split_in_groups: false
    # Эвристики для менеджера (не для бота — слишком много исключений):
    heuristics_for_manager:
      mfti_branch: "МФТИ-филиал — почти всегда УНПК МФТИ"
      patsayeva_branch: "Пацаева — почти всегда УНПК МФТИ"
      moscow: "Москва — есть и УНПК и Фотон (скорее Фотон, но много исключений)"
      online: "Онлайн — есть и УНПК и Фотон (скорее Фотон, но много исключений)"
    note: "Эвристики не используются ботом — они для менеджера. Бот определяет бренд только по каналу входа."
    detection_in_scripts: "В скрипте обзвонов Насти: 'Если в названии группы стоит (УНПК), то звоним от УНПК. Остальным звоним от ФОТОН.' — это правило обзвонов, не определение бренда."

  bot_brand_detection_strategy:
    # АРХИТЕКТУРНОЕ РЕШЕНИЕ Дмитрия от 2026-05-17 (ответ 4.2):
    # Запускаем ДВА ОТДЕЛЬНЫХ Telegram-бота с разными @username и токенами.
    # Бот узнаёт свой бренд из своего собственного контекста, не из CRM.
    architecture: "two_separate_bots"
    foton_bot_telegram: "@TODO_foton_bot"  # уточнить
    unpk_bot_telegram: "@TODO_unpk_bot"    # уточнить
    additional_lvsh_channel: "@kmiptlvs (выездные школы, относится к УНПК)"
    safety_implication: "Полная изоляция: клиент пишет одному боту, второй не видит. Cross-brand утечка невозможна на уровне канала."

