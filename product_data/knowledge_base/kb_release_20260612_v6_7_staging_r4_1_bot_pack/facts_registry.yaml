  title: presentation format facts 2026 05 21 / client facts / levels explained /
    client safe text
  fact_text: 'В Фотоне есть три уровня подготовки: базовый — закрыть пробелы и уверенно
    идти по школьной программе; продвинутый — углублённая программа и темы за пределами
    школы с элементами олимпиад; олимпиадный — подготовка к перечневым олимпиадам
    и более сложным задачам. Уровень группы можно поменять, если ребёнку будет слишком
    легко или сложно.'
