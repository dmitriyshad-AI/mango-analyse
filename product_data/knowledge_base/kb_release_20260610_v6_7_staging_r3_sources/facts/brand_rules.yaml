schema_version: brand_rules_v6_1_2026_05_20_team_answers
generated_at: '2026-05-20'
authority: Решение Дмитрия Фабарисова от 2026-05-17, подтверждено в ТЗ Codex
severity: critical
core_rule:
  text: УНПК МФТИ и Фотон — для клиента две разные организации. В одном клиентском
    сообщении нельзя упоминать оба бренда, сравнивать их условия, цены, скидки, рассрочку,
    документы, лагерь, контакты или правила. УНПК МФТИ не консультирует по Фотону.
    Фотон не консультирует по УНПК. Любая cross-brand информация — внутренняя, не
    клиентская.
  why: УНПК МФТИ и Фотон официально больше не сотрудничают. Каждый бренд официально
    не знает условий другого. Сравнение или признание связи — юридический и репутационный
    риск.
active_brand:
  description: Параметр контекста. Бот работает строго в режиме одного активного бренда.
  allowed_values:
  - foton
  - unpk
  - unknown
  default: unknown
  source_of_truth: 'Из канала входа: telegram_unpk_bot -> unpk; telegram_foton_bot
    -> foton; mango_call_route -> определяется по группе АМО'
fact_filter:
  for_client_draft:
    allow:
    - brand == active_brand
    - brand == brand_neutral AND no_other_brand_mentioned == true
    forbid:
    - brand == other_brand
    - cross_brand_policy == forbidden_for_client
    - cross_brand_mixed == true
    - internal_only == true
    - содержит названия 4 юр.лиц других брендов
  for_manager_handoff:
    allow_additional:
    - internal_only == true (как подсказка менеджеру)
    - cross_brand_policy == manager_handoff_only
    still_forbid:
    - клиент видит этот текст напрямую
forbidden_client_mentions:
  when_active_brand_is_foton:
    blocked_terms:
    - УНПК
    - УНПК МФТИ
    - АНО ДПО
    - АНО ДПО УНПК
    - АНО ДПО «УНПК МФТИ»
    - НОУ УНПК
    - НОУ УНПК МФТИ
    - лицензия № 70369
    - лицензия 70369
    - от 06.03.2013
    - kmipt.ru
    - '@unpk_mipt'
    - +7 (495) 150-81-51
    - 8 (800) 500-81-51
    - edu@kmipt.ru
    - Сретенка
    - Сретенка, 20
    exception: Только нейтральная утверждённая фраза о прошлом сотрудничестве, если
      клиент прямо спросил про связь брендов
  when_active_brand_is_unpk:
    blocked_terms:
    - Фотон
    - ФОТОН
    - ЦДПО Фотон
    - ООО «ЦДПО Фотон»
    - ООО ЦДПО Фотон
    - ЦРДО Фотон
    - ООО «ЦРДО Фотон»
    - ООО ЦРДО Фотон
    - cdpofoton.ru
    - edu@cdpofoton.ru
    - '@cdpoFoton'
    - 8 (495) 500-25-88
    - 8 (800) 550-25-88
    - Т-Банк рассрочка
    - Долями
    - vk.ru/foton_edu
    - foton_edu
    exception: Только нейтральная утверждённая фраза о прошлом сотрудничестве, если
      клиент прямо спросил про связь брендов
  enforcement: Это пост-фильтр на draft_text перед отправкой. Если хоть один blocked_term
    встречается — draft уходит на ручную правку менеджеру с пометкой brand_separation_violation.
shared_brand_entities_allowed:
- entity: Менделеево
  contexts:
  - lvsh_mendeleevo
- entity: Верхняя Красносельская ул., 30
  contexts:
  - ls_city_2026_foton
  - ls_city_2026_unpk
allowed_client_phrasings:
- phrase: Сейчас уточню подходящий вариант у менеджера.
  when: Клиент задал вопрос, на который у бота нет точного бренд-факта
- phrase: Передам менеджеру, он подскажет, какие есть варианты по вашему запросу.
  when: Запрос не подходит под текущий бренд
- phrase: По этому вопросу лучше сверить актуальные условия, чтобы не ошибиться.
  when: Факт устарел или динамический
approved_brand_relationship_answer:
  trigger_question_patterns:
  - вы и Фотон это одно
  - вы и УНПК это одно
  - это одна компания
  - одна организация
  - связаны с
  approved_response: Это отдельные организации, по вашему вопросу сориентирую в рамках
    текущего учебного центра.
  followup_rule: После этой фразы бот не раскрывает историю отношений брендов и не
    описывает условия другого бренда. Если клиент настаивает или вопрос чувствительный
    — handoff менеджеру.
  forbidden_in_this_response:
  - раньше сотрудничали
  - были одно
  - наш партнёр
  - общая история
  open_question_for_rop_q3: 'Согласовать финальную формулу с юристом. Возможно более
    нейтральные варианты. Решение Дмитрия от 2026-05-17: до решения РОПа использовать
    «Это отдельные организации, по вашему вопросу сориентирую в рамках текущего учебного
    центра».'
forbidden_client_phrasings:
- В УНПК рассрочки нет, а в Фотоне есть
- В Фотоне нет, а в УНПК есть
- Фотон предлагает X, а УНПК Y
- Мы можем перевести вас в Фотон
- Мы можем перевести вас в УНПК
- У них есть места / цены / условия
- Фотон и УНПК — наши две компании
- Это наш партнёрский центр
- Раньше мы были вместе
- Раньше сотрудничали
- Раньше были одно
- Общая история
- Можете посмотреть у наших партнёров
- Любое сравнение условий двух брендов
brand_switch_manager_review_required:
  trigger: Клиент бота A просит услугу/условие, которого в бренде A нет, но которое
    есть в бренде B
  bot_action_to_client:
  - Сейчас уточню у менеджера подходящий вариант — он свяжется в течение рабочего
    дня.
  - Не называть бренд B
  - Не описывать условия бренда B
  - Не намекать на бренд B
  internal_flag_for_manager:
    field: brand_switch_manager_review_required
    value: true
    manager_visible_text: Клиент текущего бренда запросил услугу, которой нет в текущем
      бренде. Менеджер сам решает — предложить ли альтернативного провайдера в отдельном
      диалоге. Не консультировать клиента по другому бренду внутри текущего диалога.
cross_brand_mixed:
  description: Все фрагменты источников, где УНПК и Фотон сравниваются, описываются
    вместе, либо где в одном тексте идут условия обоих брендов.
  detection_patterns:
  - Фотон.*УНПК на расстоянии до 300 символов
  - УНПК.*Фотон на расстоянии до 300 символов
  - АНО ДПО.*ЦДПО Фотон
  - Скрипты перевода УНПК → Фотон
  - Таблицы с тарифами обоих брендов
  policy:
    cross_brand_policy: forbidden_for_client
    cross_brand_mixed: true
    forbidden_for_client: true
    allowed_for_client_answer: false
    usable_in_manager_internal_view: true
    usable_in_client_draft: false
known_cross_brand_sources:
- source: Google Doc «Цены ФОТОН + УНПК от 16.03.2026»
  note: Содержит цены обоих брендов в одной таблице. Импортируется в kb v2, но split
    по бренду — обязателен. Клиент видит только своё.
- source: Обзвоны - скрипты (call_scripts.txt в Codex pack)
  note: Скрипт ОС весна 2026 — содержит разделение «звоним от УНПК / звоним от ФОТОН».
    Это внутреннее правило для менеджера, не для клиента.
- source: Опросник РОП v5 (текущий)
  note: Содержит cross-brand фразы в темах 1, 5, 6, 11, 19a, 26, 33. Должен быть переделан
    в v6 — два опросника отдельно.
- source: База знаний КЦ.docx, раздел про 4 юр.лица
  note: Перечисляет все 4 юр.лица. Внутренний документ для бухгалтерии, не для клиента.
- source: Реестр Реестр договоров УНПК ФОТОН Жако
  note: Совмещённый внутренний реестр. internal_only.
- source: Реестр Реестр справок УНПК Фотон Жако
  note: То же. internal_only.
crm_brand_isolation:
  rule: AMO и Tallanto могут содержать историю клиента в обоих брендах. Бот видит
    ТОЛЬКО запись активного бренда.
  required_filter:
  - Фильтрация воронок/групп AMO по active_brand
  - Фильтрация Tallanto-курсов по active_brand
  reason: Если клиент раньше был в УНПК, потом перешёл в Фотон, бот Фотон не должен
    видеть его историю УНПК как «свою».
  manager_view: Менеджер может видеть полную историю в своём интерфейсе, но это не
    попадает в client_draft.
acceptance_tests:
  positive:
  - Бот Фотон отвечает на вопрос «сколько стоит» только ценами Фотона
  - Бот УНПК отвечает на вопрос «сколько стоит» только ценами УНПК
  - Бот при unknown active_brand не называет цен ни одного бренда, просит уточнить
    курс
  - Бот Фотон на вопрос «есть ли рассрочка» использует только Т-Банк/Долями, без слов
    УНПК
  - Бот УНПК на вопрос «есть ли рассрочка» использует helpfeed «варианты помесячной/семестровой/годовой
    оплаты», без слов Фотон/Т-Банк
  - Бот Фотон на «А вы и УНПК это одно?» отвечает только утверждённой формулой
  negative:
  - Бот не должен генерировать draft_text, в котором встречаются оба слова Фотон и
    УНПК одновременно (кроме approved_brand_relationship_answer)
  - Бот не должен называть юр.лица другого бренда
  - Бот не должен называть телефоны/сайты/мессенджеры другого бренда
  - Бот не должен говорить «у наших партнёров есть»
rollout_order:
- Подключить brand_rules.yaml в kc_context.py как обязательный фильтр
- Включить пост-фильтр forbidden_client_mentions на draft_text
- Запустить Stage 6 отдельно для active_brand=foton (10-15 диалогов) и active_brand=unpk
  (10-15 диалогов)
- 'Метрика: 0 violations brand-separation. Если хоть одно — фиксить до запуска пилота'
