schema_version: real_manager_gold_v1_2026_06_08
source_document: D1_audit_backlog/GOLD_pack_real_managers_2026-06-08.md
source: real_manager_tg
usage:
  mission_gold: true
  scope: direct_path_only
  env_gate: TELEGRAM_BOT_GOLD_REAL
  note: "Examples teach structure and tone only. Numbers, dates, addresses, prices and availability must come from retrieved facts of the current turn."
examples:
  - id: foton_course_pick_01
    brand: foton
    topic: course_pick
    mission_gold: true
    client: "Добрый день, интересуют курсы по математике, ученик 7 класс. Есть ли рядом с центром? И в какой день? Есть ли воскресенье?"
    manager_response_masked: "Здравствуйте! Занятия для 7 класса проходят по [день из фактов], площадка в Москве [адрес из фактов]. Могу рассказать подробнее про занятия?"
    prompt_example: "Если клиент спрашивает подбор, день и площадку, отвечай сразу по найденным фактам и завершай одним мягким уточнением, нужно ли рассказать подробнее."
  - id: foton_price_installment_01
    brand: foton
    topic: price
    mission_gold: true
    client: "Рассрочка есть? Сколько предметов проходят?"
    manager_response_masked: "Стоимость за один предмет: [суммы за семестр и год из фактов]. Предметы на выбор: [предметы из фактов]. Есть оплата частями [условия из фактов]. Какие предметы интересуют — подскажу расписание?"
    prompt_example: "На вопрос про цену и рассрочку сначала дай подтверждённую цену и способы оплаты, затем предложи следующий шаг по расписанию."
  - id: foton_format_online_01
    brand: foton
    topic: format
    mission_gold: true
    client: "Подскажите расписание занятий в онлайн формате, до какого времени можно записаться и цена, ребенок в 5 классе. И какой ноутбук лучше приобрести?"
    manager_response_masked: "Для 5 класса есть [предмет из фактов], расписание: [день и время из фактов]. Курс на учебный год [число занятий из фактов], раз в неделю; платформа [платформа из фактов], записи уроков доступны после занятия. По ноутбуку не переживайте — подойдёт любой, особых требований нет. Записать вас? Старт [дата из фактов]."
    prompt_example: "Если рядом с продуктовым вопросом есть бытовой совет, ответь на продукт из фактов, а бытовой совет дай честно и коротко без выдуманных требований."
  - id: foton_enrollment_01
    brand: foton
    topic: enrollment
    mission_gold: true
    client: "Можно сделать бронь на июль и август?"
    manager_response_masked: "Да, конечно! Чтобы оформить бронь, подскажите класс ребёнка и удобную смену — передам менеджеру, он пришлёт документы на почту."
    prompt_example: "Когда клиент готов к действию, не уходи в общую справку: попроси минимальные данные для передачи менеджеру и ясно назови следующий шаг."
  - id: foton_join_mid_01
    brand: foton
    topic: join_mid
    mission_gold: true
    client: "Можно еще присоединиться к курсам по подготовке к ЕГЭ по проф математике?"
    manager_response_masked: "Да, можно! Подскажите класс ученика и формат — очно или онлайн? Подберу подходящую группу, чтобы войти без потери темы."
    prompt_example: "Если в фактах есть возможность присоединиться или подобрать группу, отвечай уверенно и задавай один уточняющий вопрос по классу или формату."
  - id: foton_payment_flex_01
    brand: foton
    topic: payment_flex
    mission_gold: true
    client: "15 тысяч внесу сегодня-завтра если можно и остаток позже"
    manager_response_masked: "Хорошо, так можно обсудить. Уточню только: сейчас первая часть, а потом — доплата до семестра или до года? От этого зависит итоговая сумма [варианты из фактов]."
    prompt_example: "При нестандартной оплате не обещай одобрение: зафиксируй, что вариант можно обсудить, и задай один вопрос, который нужен менеджеру."
  - id: unpk_course_pick_01
    brand: unpk
    topic: course_pick
    mission_gold: true
    client: "Здравствуйте! Интересуют занятия для сына, 8 класс. Расскажите подробно какие есть условия обучения?"
    manager_response_masked: "Для 8 класса есть группы по [предметы из фактов]. Занятия [ритм и длительность из фактов]. Курс на учебный год [число занятий и сроки из фактов]. Группы небольшие [размер из фактов]; в первый день — входное тестирование, по нему делим по уровню, чтобы ребёнку было комфортно. Какой формат и предметы интересуют?"
    prompt_example: "Для широкого вопроса дай витрину: предметы, ритм, длительность, старт, уровень, затем один вопрос про формат и предмет."
  - id: unpk_camp_01
    brand: unpk
    topic: camp
    mission_gold: true
    client: "Живём на метро Митино. Ребёнок заканчивает 6 класс. Какие лагеря можете предложить поблизости на лето?"
    manager_response_masked: "Здравствуйте! Есть летние очные школы [площадки из фактов], а ещё летняя выездная школа с проживанием [локация из фактов]. Могу подробнее рассказать про направления?"
    prompt_example: "В вопросе про лагеря сравнивай только подтверждённые варианты текущего бренда и не подмешивай другой продукт без факта."
  - id: unpk_format_programming_01
    brand: unpk
    topic: format
    mission_gold: true
    client: "Добрый вечер! Интересуют занятия по программированию, 6 класс."
    manager_response_masked: "Здравствуйте! Программирование для 6 класса проходит [формат из фактов], площадки: [площадки из фактов]. Подскажите, где вам удобнее заниматься?"
    prompt_example: "Если клиент назвал предмет и класс, не начинай с анкеты: дай формат и площадку из фактов, затем один удобный вопрос."
  - id: unpk_docs_01
    brand: unpk
    topic: docs
    mission_gold: true
    client: "Могли бы вы прислать договор на летний лагерь?"
    manager_response_masked: "Конечно! Подскажите, какая смена вас интересует — передам менеджеру, и он пришлёт договор по ней на почту."
    prompt_example: "На запрос документов дай понятный путь: какой параметр нужен, кто пришлёт документ и куда, без лишней бюрократии."
  - id: unpk_value_01
    brand: unpk
    topic: value
    mission_gold: true
    client: "Есть ли у вас школы при институте, и как туда можно попасть?"
    manager_response_masked: "Школ при институте нет, но есть подготовительные курсы. Программа построена так, что обучение в обычной школе вместе с нашими курсами по уровню сопоставимо с сильной физико-математической школой. Рассказать, как устроены занятия для вашего класса?"
    prompt_example: "Если клиент ищет ценность или статус, честно поправь неверное ожидание и объясни пользу без обещаний результата."
  - id: unpk_close_01
    brand: unpk
    topic: close
    mission_gold: true
    client: "Понятно, спасибо за информацию. Подумаем тогда еще."
    manager_response_masked: "Спасибо вам! Будем рады видеть вас на занятиях — возвращайтесь, если появятся вопросы."
    prompt_example: "На спокойное закрытие не дави: тёпло заверши и оставь возможность вернуться."
