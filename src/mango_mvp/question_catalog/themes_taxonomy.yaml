themes:
- theme_id: theme:001_pricing
  theme_name: Стоимость обучения
  business_block: Финансы и оплата
  short_description: Клиент спрашивает, сколько стоит обучение.
  not_this_theme:
  - Статус его конкретного платежа -> theme:003_payment_status
  - Скидки -> theme:005_discounts
  - Рассрочка -> theme:006_installment
  - Оплата маткапиталом -> theme:007_matkap_payment
  example_phrasings:
  - Сколько стоит подготовка к ЕГЭ по математике?
  - Цена за регулярный курс?
  - Сколько в месяц занятия по профилю?
  relevant_parameters:
  - product
  - subject
  - grade
  - format
  default_bot_permission: answer_after_fact_check
  required_facts:
  - prices.current
  forbidden_promises:
  - Не называть цены, которых нет в свежем прайсе
  - Не обещать как в прошлом году
  escalation_rule: Менеджер, если прайс отсутствует или клиент торгуется.
  legacy_parent_mapping:
  - стоимость
  - оплата / возврат / чек
  rop_decision: Бот отвечает после проверки актуального факта
  rop_approved_phrasing: 'Стоимость {продукт} по {предмет} для {класс} класса в {формат} : {цена} за {период}. На 2й и последующие
    предметы действует скидка {скидка}. Точные условия согласуем с менеджером индивидуально.'
  rop_mandatory_data: Продукт (регулярный курс / летняя школа / интенсив / олимпиады / индивидуальные / пробное), предмет,
    класс ребёнка, желаемый формат (онлайн/очно).
  rop_forbids_extra: Не называть цену без проверки в актуальном прайсе; не обещать «как было в прошлом году»; не давать диапазон
    без подтверждения; не комментировать конкурентов.
  rop_handoff_target: Менеджер группы (если прайс отсутствует, клиент торгуется или запрос непонятен).
  rop_comment: Обязательная проверка свежести прайса (не старше 30 дней).
- theme_id: theme:002_payment_method
  theme_name: Способ оплаты
  business_block: Финансы и оплата
  short_description: Клиент спрашивает, как технически провести оплату.
  not_this_theme:
  - Оплата маткапиталом -> theme:007_matkap_payment
  - Статус прошедшего платежа -> theme:003_payment_status
  example_phrasings:
  - Как оплатить?
  - Куда переводить?
  - Есть ссылка на оплату?
  - Можно ли картой?
  relevant_parameters:
  - product
  - customer_status
  default_bot_permission: answer_after_fact_check
  required_facts:
  - payment_methods.current
  forbidden_promises:
  - Не давать произвольные номера карт или счетов
  escalation_rule: Менеджер при нестандартных способах оплаты.
  legacy_parent_mapping:
  - оплата / возврат / чек
  rop_decision: Бот отвечает после проверки актуального факта
  rop_approved_phrasing: Оплатить можно банковской картой, переводом по реквизитам или через СБП. Подскажите, пожалуйста,
    как вам удобнее оплатить? После подтверждения деталей менеджер пришлет всю необходимую информацию.
  rop_mandatory_data: Какой курс/продукт оплачивается, ФИО ребёнка (для назначения платежа).
  rop_forbids_extra: Не давать конкретные реквизиты счёта в чат; не обещать ссылку «прямо сейчас» без подтверждения менеджера.
  rop_handoff_target: Менеджер группы (нестандартные способы — наличные, маткапитал → тема 7, рассрочка → тема 6, юрлицо).
  rop_comment: ''
- theme_id: theme:003_payment_status
  theme_name: Статус платежа и подтверждение
  business_block: Финансы и оплата
  short_description: Клиент уже платил и спрашивает, прошло ли, просит чек, квитанцию, счет или подтверждение.
  not_this_theme:
  - Способ оплаты -> theme:002_payment_method
  - Возврат денег -> theme:009_refund
  example_phrasings:
  - Оплатил, прошло?
  - Пришлите чек
  - Где квитанция?
  - Не вижу подтверждения
  relevant_parameters:
  - product
  default_bot_permission: draft_for_manager
  required_facts:
  - customer_payment_history.dynamic
  forbidden_promises:
  - Не подтверждать оплату без сверки
  - Не обещать чек без проверки доступности
  escalation_rule: Менеджер всегда, требуется доступ к платежной системе.
  legacy_parent_mapping:
  - оплата / возврат / чек
  rop_decision: Бот только собирает данные и передает менеджеру
  rop_approved_phrasing: Принято. Уточняю статус платежа у менеджера — он свяжется с вами в течение рабочего дня и пришлёт
    подтверждение.
  rop_mandatory_data: ФИО плательщика, ФИО ребёнка, сумма, дата платежа, способ оплаты (карта / перевод / СБП).
  rop_forbids_extra: Не подтверждать оплату без сверки; не обещать чек без проверки доступности; не озвучивать суммы прошлых
    платежей по памяти.
  rop_handoff_target: Менеджер группы всегда — требуется доступ к платёжной системе и AMO.
  rop_comment: ''
- theme_id: theme:004_payment_schedule
  theme_name: Срок и график оплаты
  business_block: Финансы и оплата
  short_description: Клиент спрашивает, когда нужно платить, до какой даты или с какой периодичностью.
  not_this_theme:
  - Рассрочка -> theme:006_installment
  - Задолженность или индивидуальный перенос оплаты -> theme:009_refund
  example_phrasings:
  - До какого числа платить?
  - Когда следующий платеж?
  - Сколько раз в месяц списывается?
  relevant_parameters:
  - product
  - format
  default_bot_permission: answer_after_fact_check
  required_facts:
  - payment_schedule.current
  forbidden_promises:
  - Не обещать перенос даты оплаты
  escalation_rule: Менеджер при индивидуальных условиях.
  legacy_parent_mapping:
  - оплата / возврат / чек
  rop_decision: Бот отвечает после проверки актуального факта
  rop_approved_phrasing: 'Оплата по {продукт} производится {периодичность} до {дата}. Следующий платёж: {дата_следующего}.'
  rop_mandatory_data: Какой продукт, ФИО ребёнка (для уточнения индивидуальных условий).
  rop_forbids_extra: Не обещать перенос даты оплаты; не сдвигать срок без менеджера.
  rop_handoff_target: Менеджер группы (индивидуальные условия, рассрочка, задолженность).
  rop_comment: Для действующих клиентов — обязательная сверка в AMO/Tallanto перед ответом.
- theme_id: theme:005_discounts
  theme_name: Скидки и условия
  business_block: Финансы и оплата
  short_description: Клиент спрашивает про общие правила скидок, акции, промокоды или льготы.
  not_this_theme:
  - Рассрочка -> theme:006_installment
  example_phrasings:
  - Есть ли скидки?
  - Многодетным дают?
  - А промокод?
  relevant_parameters:
  - product
  - customer_status
  default_bot_permission: answer_after_fact_check
  required_facts:
  - discounts.current
  forbidden_promises:
  - Не обещать индивидуальную скидку
  - Не называть устаревшие акции
  escalation_rule: Менеджер при просьбе об индивидуальной скидке.
  legacy_parent_mapping:
  - скидки
  rop_decision: Бот отвечает после проверки актуального факта
  rop_approved_phrasing: 'У нас действуют скидки: {список_акций}. Для многодетных семей: {условия}. Подробности по конкретному
    курсу уточнит менеджер.'
  rop_mandatory_data: Какой продукт, статус клиента (новый/действующий), наличие соц. категории (многодетные, опекунство).
  rop_forbids_extra: Не обещать индивидуальную скидку; не называть скидки, которых нет в утверждённом списке; не комментировать
    конкурентов.
  rop_handoff_target: Менеджер группы (просьба индивидуальной скидки, торг).
  rop_comment: Список акций обновлять минимум раз в месяц.
- theme_id: theme:006_installment
  theme_name: Рассрочка
  business_block: Финансы и оплата
  short_description: Клиент спрашивает про возможность платить по частям, условия рассрочки или банк-партнер.
  not_this_theme:
  - Обычный график оплаты -> theme:004_payment_schedule
  - Частичная оплата как факт прошлого -> theme:009_refund
  example_phrasings:
  - Есть рассрочка?
  - Можно частями?
  - Каков процент?
  relevant_parameters:
  - product
  default_bot_permission: answer_after_fact_check
  required_facts:
  - installment_terms.current
  forbidden_promises:
  - Не обещать одобрение рассрочки
  escalation_rule: Менеджер для оформления.
  legacy_parent_mapping:
  - рассрочка
  rop_decision: Бот отвечает после проверки актуального факта
  rop_approved_phrasing: 'Рассрочка возможна на {условия}. Банк-партнёр: {название}. Оформление заявки — через менеджера.'
  rop_mandatory_data: Какой продукт, желаемое количество платежей.
  rop_forbids_extra: Не обещать одобрение рассрочки; не комментировать решение банка-партнёра.
  rop_handoff_target: Менеджер группы (оформление заявки).
  rop_comment: Рассрочка только на организации "Фотон"
- theme_id: theme:007_matkap_payment
  theme_name: Оплата маткапиталом
  business_block: Финансы и оплата
  short_description: Клиент спрашивает про процедуру использования материнского капитала для оплаты обучения.
  not_this_theme:
  - Документы для маткапитала как отдельный операционный запрос -> theme:012_certificates
  - Обычный способ оплаты -> theme:002_payment_method
  example_phrasings:
  - Можно маткапиталом?
  - Какие документы для маткапитала?
  - Как оформить через ПФР?
  relevant_parameters:
  - product
  default_bot_permission: draft_for_manager
  required_facts:
  - matkap_procedure.current
  - matkap_documents.current
  forbidden_promises:
  - Не обещать сроки одобрения
  - Не давать юридические гарантии
  escalation_rule: Менеджер всегда.
  legacy_parent_mapping:
  - оплата / возврат / чек
  rop_decision: Бот только собирает данные и передает менеджеру
  rop_approved_phrasing: По маткапиталу оплата возможна. Менеджер пришлёт перечень документов и поможет с оформлением через
    ПФР.
  rop_mandatory_data: 'ФИО ребёнка, какой курс,какой период обучения, семестр/год, контакт для связи, тип материнского капитала:
    региональный/федеральный'
  rop_forbids_extra: Не обещать сроки одобрения ПФР; не давать юридические гарантии; не комментировать остаток на сертификате.
  rop_handoff_target: Менеджер группы всегда — юридически чувствительная процедура.
  rop_comment: Процедуру согласовать с бухгалтерией заранее. Мы раюотаем только с федеральным материнским капиталом
- theme_id: theme:008_tax_deduction
  theme_name: Налоговый вычет
  business_block: Финансы и оплата
  short_description: Клиент спрашивает про процедуру получения налогового вычета за обучение или нужные справки.
  not_this_theme:
  - Возврат денег за услугу -> theme:009_refund
  - Договор -> theme:011_contract
  example_phrasings:
  - Можно получить налоговый вычет?
  - Дайте справку для налоговой
  - Какая лицензия у вас?
  relevant_parameters:
  - customer_status
  default_bot_permission: draft_for_manager
  required_facts:
  - tax_deduction_procedure.current
  - license_documents.current
  forbidden_promises:
  - Не консультировать по налоговому законодательству
  escalation_rule: Менеджер при сложных случаях, например несколько детей или разные годы.
  legacy_parent_mapping:
  - налоговый вычет / справки
  rop_decision: Бот только собирает данные и передает менеджеру
  rop_approved_phrasing: Налоговый вычет за обучение возможен — у нас есть лицензия. Для получения справки нужно будет заполнить
    заявление и прикрепить чеки/ выписки из банка/ квитанции из банка об оплате образовательных услуг за тот год, за который
    хотите получить справку.
  rop_mandatory_data: За какой период нужна справка, ФИО плательщика, ФИО ребёнка.
  rop_forbids_extra: Не консультировать по налоговому законодательству; не обещать конкретную сумму вычета.
  rop_handoff_target: Менеджер группы при сложных случаях (несколько детей, прошлые годы, нестандартные ситуации).
  rop_comment: Типовая справка готовится за 3 рабочих дня.
- theme_id: theme:009_refund
  theme_name: Возврат денег / отказ от обучения
  business_block: Возвраты и изменения
  short_description: Клиент хочет вернуть оплату, отказаться от услуги или расторгнуть договор.
  not_this_theme:
  - Перенос или изменение условий -> theme:010_change_terms
  - Налоговый вычет -> theme:008_tax_deduction
  example_phrasings:
  - Хочу вернуть деньги
  - Отказываюсь от обучения
  - Расторгните договор
  - Перерасчет за пропуски
  relevant_parameters:
  - product
  default_bot_permission: manager_only
  required_facts:
  - refund_policy.current
  forbidden_promises:
  - Не обещать возврат
  - Не называть конкретные суммы возврата
  - Не комментировать штрафы
  escalation_rule: Менеджер всегда, P0 приоритет.
  legacy_parent_mapping:
  - изменение / отмена услуги
  - оплата / возврат / чек
  rop_decision: Только менеджер
  rop_approved_phrasing: Принято. Передаю запрос менеджеру — он свяжется с вами для оформления процедуры в течение рабочего
    дня.
  rop_mandatory_data: ФИО, какой курс, причина (свободная форма), контакт для связи.
  rop_forbids_extra: Не обещать возврат; не называть конкретные суммы возврата; не комментировать штрафы или удержания; не
    извиняться за «недостатки» услуги.
  rop_handoff_target: Менеджер группы всегда, P0 приоритет (срочно).
  rop_comment: Фиксируем причину для статистики; РОП получает копию запроса в течение часа.
- theme_id: theme:010_change_terms
  theme_name: Перенос / изменение условий
  business_block: Возвраты и изменения
  short_description: Клиент просит перенос на другую группу, смену формата, изменение расписания или перенос смены лагеря.
  not_this_theme:
  - Возврат денег -> theme:009_refund
  - Отмена записи на следующий год -> theme:021_continuation
  example_phrasings:
  - Можно перенести на следующий месяц?
  - Хочу в другую группу
  - С очного на онлайн?
  relevant_parameters:
  - product
  - format
  default_bot_permission: draft_for_manager
  required_facts:
  - group_availability.dynamic
  forbidden_promises:
  - Не обещать конкретную группу или слот
  - Не подтверждать без сверки
  escalation_rule: Менеджер всегда.
  legacy_parent_mapping:
  - изменение / отмена услуги
  rop_decision: Бот только собирает данные и передает менеджеру
  rop_approved_phrasing: Принято. Уточню возможность переноса у менеджера — он свяжется с вами с вариантами.
  rop_mandatory_data: ФИО ребёнка, на какой курс/группу перенос, желаемая дата, причина (опционально).
  rop_forbids_extra: Не обещать конкретную группу или слот; не подтверждать без сверки с расписанием.
  rop_handoff_target: Менеджер группы всегда.
  rop_comment: Конфликты по группе разрешает менеджер.
- theme_id: theme:011_contract
  theme_name: Договор и его экземпляры
  business_block: Документы
  short_description: Клиент спрашивает про получение договора, копию, подписание, переподписание или отправку экземпляра.
  not_this_theme:
  - Справки для налоговой -> theme:012_certificates
  - Договор как юридический спор -> theme:029_legal_question
  example_phrasings:
  - Можно копию договора?
  - Где подписать?
  - Не пришел договор
  - Распечатать?
  relevant_parameters:
  - customer_status
  default_bot_permission: draft_for_manager
  required_facts:
  - contract_template.current
  - customer_contract_status.dynamic
  forbidden_promises:
  - Не обещать сроки отправки
  - Не подменять оригиналы
  escalation_rule: Менеджер всегда.
  legacy_parent_mapping:
  - документы / договор
  - оплата / договор / документы
  - письма / справки / подтверждающие документы
  rop_decision: Бот только собирает данные и передает менеджеру
  rop_approved_phrasing: Договор пришлёт менеджер. Уточняю детали — он направит экземпляр в течение рабочего дня.
  rop_mandatory_data: ФИО плательщика, ФИО ребёнка, какой курс, email для отправки.
  rop_forbids_extra: Не отправлять договор сам; не обещать сроки без подтверждения; не подменять оригиналы копиями без согласования.
  rop_handoff_target: Менеджер группы всегда.
  rop_comment: ''
- theme_id: theme:012_certificates
  theme_name: Справки и подтверждающие документы
  business_block: Документы
  short_description: Клиент просит справку, форму, бланк или другой подтверждающий документ.
  not_this_theme:
  - Договор -> theme:011_contract
  - Документы для маткапитала -> theme:007_matkap_payment
  example_phrasings:
  - Нужна справка для работы
  - Дайте подтверждение оплаты на бланке
  - Где скачать форму?
  relevant_parameters:
  - customer_status
  - document_type
  default_bot_permission: draft_for_manager
  required_facts:
  - document_templates.current
  forbidden_promises:
  - Не обещать конкретные сроки выдачи
  - Не выдавать персональные данные в шаблоне
  escalation_rule: Менеджер всегда.
  legacy_parent_mapping:
  - письма / справки / подтверждающие документы
  rop_decision: Бот только собирает данные и передает менеджеру
  rop_approved_phrasing: Принято. Менеджер подготовит справку и пришлёт в течение 3 рабочих дней.
