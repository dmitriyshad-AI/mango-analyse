  - source_id: "courses_pk_mfti_unpk.txt"
    type: "google_drive_doc_export"
    severity: critical
    rule: "Стратегический pre-sales документ для МФТИ/РосНОУ. Перечисляет обе компании и внутренних людей (Тавлеев, Фабарисов и т.д.). Internal_only."
    found_in: "enrichment_log/01_gdrive_exports_review_part3.md"

  - source_id: "script_positive_answer_flow.txt"
    type: "google_drive_doc_export"
    severity: critical
    rule: "Пункт 8 содержит фразу «лучшими являются две компании УНПК МФТИ и Фотон». Эта фраза запрещена в клиентском тексте."
    found_in: "enrichment_log/01_gdrive_exports_review_part4.md"

  - source_id: "qa_pairs.csv:cross_brand_21"
    type: "qa_pairs_subset"
    severity: high
    count: 21
    rule: "21 QA-пара упоминает оба бренда в одном ответе. Не использовать как client_safe_text."
    found_in: "enrichment_log/03_qa_pairs_topX_per_theme.md"

  - source_id: "knowledge_chunks.csv:brand=mixed"
    type: "chunks_subset"
    severity: high
    count: 101
    rule: "101 chunk с brand=mixed. Внутренние — нельзя как client_safe_text."
    found_in: "enrichment_log/04_chunks_per_theme.md"

  - source_id: "conversation_scripts.csv:cross_brand_3"
    type: "scripts_subset"
    severity: critical
    count: 3
    rule: "3 скрипта явно cross-brand. Перечислены в 06_conversation_scripts_classification.md."
    found_in: "enrichment_log/06_conversation_scripts_classification.md"

