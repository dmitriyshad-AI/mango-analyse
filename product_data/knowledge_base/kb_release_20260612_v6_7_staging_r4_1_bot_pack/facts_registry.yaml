  title: kb v6 5 client safe facts 2026 06 03 / city summer school discounts / client
    safe text
  fact_text: 'Скидки на летнюю школу: многодетным семьям — 10% (по статусу семьи,
    нужно удостоверение); действующим/бывшим ученикам — 5% (на смены того же учебного
    центра, где учились); тем, кто записался и оплатил следующий учебный год — 10%.
    По акции «приведи друга» кэшбэк за нового ученика, ранее не посещавшего летнюю
    школу: на тариф «База» — 3 000 ₽, на тарифы с факультативом/премиум — 5 000 ₽.
    Скидки не суммируются — применяется наибольшая. Любые другие скидки — только по
    согласованию с менеджером.'
