    text
  fact_text: В выездной школе есть направления ФизМат для 5-10 класса и ИТ для 7-10
    класса. На ИТ-направлении группы делятся по уровню владения Python; все группы
    по информатике работают на Python. Отдельного направления только по математике
    на выездной школе нет.
