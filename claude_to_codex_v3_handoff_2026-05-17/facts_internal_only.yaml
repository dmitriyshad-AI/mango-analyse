cross_brand_sources_inventory:
  - source_id: "unpk_to_foton_script.txt"
    type: "google_drive_doc_export"
    severity: critical
    rule: "Весь файл — internal_only. Это скрипт перевода клиента с УНПК на Фотон. Бот ни одного из брендов не должен использовать ни одну фразу из этого скрипта."
