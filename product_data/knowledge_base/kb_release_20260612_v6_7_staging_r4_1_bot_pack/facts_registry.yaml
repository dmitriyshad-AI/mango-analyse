  title: presentation format facts 2026 05 21 / client facts / knowledge control /
    client safe text
  fact_text: 'Контроль знаний строится не только на занятиях: есть вступительное и
    финальное тестирование, контрольные срезы примерно раз в 2-3 месяца, обратная
    связь от преподавателя в личном кабинете в течение 2 недель. Для 9-11 классов
    предусмотрены пробные экзамены 2 раза в год, для 3-8 классов — олимпиадные активности.'
