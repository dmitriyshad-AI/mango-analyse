# Многоходовые gold-диалоги (2026-05-23) — корпус «как вести клиента по-человечески».
# Назначение: few-shot и эталон ПОВЕДЕНИЯ в многоходовом диалоге (память, answer-first, шаг).
# НЕ дословные скрипты. Только текущие факты, бренд-чисто, без обещаний действия ботом.
# Схема на каждом диалоге: brand / journey / route / required_fact_ids / forbidden_if_fact_missing / teaches.
# Правило инъекции: брать диалог, только если его required_fact_ids подтверждены в КБ активного бренда.
# v1.2 корпуса (26 диалогов, 13 Фотон / 13 УНПК, все многоходовые — учат память/контекст,
# обработку возражений, эмоций и честное раскрытие ИИ по запросу). Срочность по цене варьируется.
# Политика «ты бот?»: вариант C, утв. Дмитрием 2026-05-23 (честно по запросу, без вендора/промпта,
# не врать «я человек», бренд-специфично). Масштабируется до 30-50 по реальным транскриптам провалов.

dialogues:
