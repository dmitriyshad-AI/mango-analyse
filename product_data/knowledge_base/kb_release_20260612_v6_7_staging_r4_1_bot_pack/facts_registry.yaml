  title: cross brand handoff notes / matkap / rule
  fact_text: 'Внутренне: материнский капитал, правило — Маткапитал принимает только
    УНПК (через АНО ДПО). Бот Фотон при вопросе про маткапитал делает handoff менеджеру,
    не консультируя по УНПК. Менеджер Фотона может организовать переход на отдельный
    диалог с УНПК, но это не задача бота..'
