  title: kb v6 5 client safe facts 2026 06 03 / city summer school moscow / client
    safe text
  fact_text: 'Городская летняя школа Фотон — очно в Москве (Верхняя Красносельская
    ул., 30, м. Красносельская), без проживания. Смена 3–14 августа. Классы 5–10.
    Направления: ФизМат (программа «Формула Физтеха») и ИИ (программа «AI Lab»). Режим:
    2 недели = 10 учебных дней, занятия пн–пт, сб–вс выходные. Утренний клуб «Предлёнка»
    — бесплатно, 09:45–11:45, со 2-го дня обучения.'
