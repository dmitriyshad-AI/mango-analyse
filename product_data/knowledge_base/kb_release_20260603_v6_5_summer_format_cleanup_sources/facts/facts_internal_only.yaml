    note: Эвристики не используются ботом — они для менеджера. Бот определяет бренд
      только по каналу входа.
    detection_in_scripts: 'В скрипте обзвонов Насти: ''Если в названии группы стоит
      (УНПК), то звоним от УНПК. Остальным звоним от ФОТОН.'' — это правило обзвонов,
      не определение бренда.'
  bot_brand_detection_strategy:
